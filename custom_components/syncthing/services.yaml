        text:

resume_device:
  name: Resume device
  description: Resume synchronization with a specific device.
  fields:
    device_id:
      name: Device ID
      description: The Syncthing device ID to resume.
      required: true
      example: "P56IOI7-MZJNU2Y-IQGDREY-DM2MGTI"
