scan_folder:
  name: Scan folder
  description: Trigger a rescan of a specific Syncthing folder.
  fields:
    folder_id:
      name: Folder ID
      description: The Syncthing folder ID to scan.
      required: true
      example: "abcd-1234"
      selector:
        text:

scan_all:
  name: Scan all folders
  description: Trigger a rescan of all Syncthing folders.

pause_folder:
  name: Pause folder
